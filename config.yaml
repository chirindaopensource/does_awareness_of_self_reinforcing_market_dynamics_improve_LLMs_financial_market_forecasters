# ==============================================================================
# SECTION 14 — REPRODUCIBILITY CAVEATS AND CRITICAL ABSENCES
# ==============================================================================

reproducibility_caveats:

  gpt5_stochasticity:
    # str. VERBATIM severity classification.
    severity: "FATAL"
    description: >
      GPT-5 runs at temperature=1.0 with no seed.  Every API call is a
      fresh stochastic draw.  The paper's GPT-5 results are single-run
      point estimates with no reported variance.  Exact numerical
      reproduction of GPT-5 results is categorically impossible under
      the paper's specification.
    # str. VERBATIM, Section 3.
    source: "VERBATIM, Section 3: 'adjustment is not permitted.'"

  model_version_drift:
    severity: "HIGH"
    description: >
      Paper provides no API version strings for any model.  Provider
      checkpoint updates change forecasting behavior even at
      temperature=0.  Results will differ numerically from original
      after any provider update.
    # List[str].
    affected_models:
      - "gpt5"
      - "claude_sonnet_4_6"
      - "gemini_3_pro"

  yahoo_finance_data_revision:
    severity: "HIGH"
    description: >
      Yahoo Finance retroactively revises Adj Close values upon new
      dividend/split events.  The exact normalized series depends on
      download date.  No download date is recorded.
    mitigation: "Archive raw CSV; verify bah_sharpe targets."

  shiller_data_revision:
    severity: "MEDIUM"
    description: >
      Shiller periodically revises historical Earnings values.
      Citation is 'Accessed May 2025' without file hash.
    mitigation: "Archive raw Excel workbook at download time."

  gemini_3_pro_deprecated:
    severity: "HIGH"
    description: >
      gemini-3-pro-preview was deprecated and shut down on March 9, 2026.
      By the paper's publication date (June 2026) this model was already
      unavailable.  Future replications must use 'gemini-3.1-pro-preview'
      as the closest successor.
    # str. CONFIRMED.
    source: "CONFIRMED: ai.google.dev/gemini-api/docs/changelog"

  no_github_repository:
    severity: "HIGH"
    description: >
      No code repository, supplementary material, or data archive link
      of any kind is provided in the paper.

  # List[str]. DERIVED from reproducibility audit.  All items are gaps
  # filled by INFERRED choices in this configuration.
  missing_specifications:
    - "task_instruction_prose_verbatim"
    - "user_message_serialization_format"
    - "json_parsing_logic"
    - "non_compliant_response_handling"
    - "sample_vs_population_std_estimator"
    - "realized_direction_sign_bucket_formula"
    - "max_tokens_setting"
    - "api_version_strings_all_three_models"
    - "number_of_independent_runs_gpt5"
    - "variance_estimates_for_any_metric"
    - "confidence_intervals_for_any_result"
